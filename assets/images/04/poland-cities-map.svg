<?xml version="1.0" encoding="UTF-8"?>
<!-- 폴란드 4도시 위치 지도 — 단순 윤곽 + 마커 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" role="img" aria-label="Poland cities map">
  <title>폴란드 4도시 위치</title>

  <!-- 배경 -->
  <rect width="600" height="500" fill="#FAF7F1"/>

  <!-- 발트 해 표시 (옅은 띠) -->
  <rect x="50" y="0" width="500" height="70" fill="#E8EEF4"/>
  <text x="80" y="40" font-family="serif" font-size="14" fill="#8FA3B5" font-style="italic">Baltic Sea</text>

  <!-- 폴란드 윤곽 (단순화) -->
  <polygon points="
    60,80
    180,55
    270,50
    380,65
    470,85
    510,170
    525,260
    495,355
    460,400
    350,425
    220,420
    140,395
    85,330
    65,240
    55,160
  " fill="#FAEDDD" stroke="#C8102E" stroke-width="2" stroke-linejoin="round"/>

  <!-- 비스와 강 -->
  <path d="M 270,75 Q 290,200 310,290 Q 320,370 310,420" fill="none" stroke="#7FA5C8" stroke-width="2" stroke-dasharray="0" opacity="0.6"/>

  <!-- 이웃 국가 라벨 (옅게) -->
  <text x="20" y="280" font-family="sans-serif" font-size="11" fill="#A09A8F">독일</text>
  <text x="560" y="200" font-family="sans-serif" font-size="11" fill="#A09A8F" text-anchor="end">벨라루스</text>
  <text x="560" y="340" font-family="sans-serif" font-size="11" fill="#A09A8F" text-anchor="end">우크라이나</text>
  <text x="40" y="430" font-family="sans-serif" font-size="11" fill="#A09A8F">체코·슬로바키아</text>

  <!-- 도시 마커 -->
  <!-- 그단스크 (북부 발트) -->
  <g>
    <circle cx="265" cy="95" r="8" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
    <text x="280" y="100" font-family="sans-serif" font-size="15" font-weight="700" fill="#1A1612">그단스크</text>
    <text x="280" y="115" font-family="sans-serif" font-size="11" fill="#837C72">Gdańsk</text>
  </g>

  <!-- 바르샤바 (중앙) -->
  <g>
    <circle cx="335" cy="215" r="10" fill="#C8102E" stroke="#FFFFFF" stroke-width="3"/>
    <text x="350" y="220" font-family="sans-serif" font-size="16" font-weight="700" fill="#1A1612">바르샤바</text>
    <text x="350" y="236" font-family="sans-serif" font-size="11" fill="#837C72">Warszawa · 수도</text>
  </g>

  <!-- 브로츠와프 (남서) -->
  <g>
    <circle cx="195" cy="320" r="8" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
    <text x="55" y="325" font-family="sans-serif" font-size="15" font-weight="700" fill="#1A1612">브로츠와프</text>
    <text x="55" y="340" font-family="sans-serif" font-size="11" fill="#837C72">Wrocław</text>
  </g>

  <!-- 크라쿠프 (남) -->
  <g>
    <circle cx="335" cy="380" r="8" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
    <text x="350" y="385" font-family="sans-serif" font-size="15" font-weight="700" fill="#1A1612">크라쿠프</text>
    <text x="350" y="400" font-family="sans-serif" font-size="11" fill="#837C72">Kraków · 옛 수도</text>
  </g>

  <!-- 자코파네 (남쪽 끝, 작은 마커) -->
  <g>
    <circle cx="320" cy="420" r="5" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5" opacity="0.75"/>
    <text x="330" y="425" font-family="sans-serif" font-size="11" fill="#837C72">자코파네</text>
  </g>

  <!-- 범례 -->
  <g transform="translate(40, 460)">
    <circle cx="0" cy="0" r="5" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
    <text x="12" y="4" font-family="sans-serif" font-size="11" fill="#837C72">주요 도시</text>
    <line x1="80" y1="0" x2="100" y2="0" stroke="#7FA5C8" stroke-width="2" opacity="0.6"/>
    <text x="106" y="4" font-family="sans-serif" font-size="11" fill="#837C72">비스와 강</text>
  </g>
</svg>
